<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyper Pro Host - Real-time File Progress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .progress-smooth { transition: width 0.3s ease-in-out; }
        .log-entry { font-family: 'Courier New', monospace; font-size: 0.75rem; border-left: 2px solid #3b82f6; padding-left: 8px; margin-bottom: 4px; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 border-b border-white/5 glass sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-500">HYPER<span class="text-white">PRO</span></h1>
            <button onclick="showSection('dashboard-section')" class="text-sm font-semibold bg-blue-600/20 text-blue-400 px-4 py-2 rounded-xl border border-blue-500/30">Dashboard</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 mt-10">
        
        <section id="upload-section" class="space-y-8">
            <div class="text-center">
                <h2 class="text-4xl font-extrabold italic">FILE-BY-FILE <span class="text-blue-500">UPLOADER</span></h2>
                <p class="text-slate-400 mt-2">Real-time progress tracking for every asset.</p>
            </div>

            <div class="glass p-8 rounded-[2.5rem] space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="user-id" placeholder="User ID" class="bg-slate-950 border border-slate-800 p-4 rounded-2xl outline-none focus:border-blue-500">
                    <input type="text" id="project-name" placeholder="Project Name" class="bg-slate-950 border border-slate-800 p-4 rounded-2xl outline-none focus:border-blue-500">
                </div>

                <div class="border-2 border-dashed border-slate-800 rounded-[2rem] p-10 text-center hover:border-blue-500 transition cursor-pointer bg-slate-900/20" onclick="document.getElementById('file-input').click()">
                    <input type="file" id="file-input" class="hidden" multiple webkitdirectory>
                    <p id="file-status" class="text-slate-400">Click to select your <span class="text-white font-bold">Project Folder</span></p>
                </div>

                <div id="progress-container" class="hidden glass p-6 rounded-3xl space-y-4 border-blue-500/20">
                    <div class="flex justify-between items-center">
                        <div>
                            <span id="uploading-file-name" class="text-xs font-bold text-blue-400 block mb-1">Preparing files...</span>
                            <span id="file-size-info" class="text-[10px] text-slate-500 uppercase">0 KB / 0 KB</span>
                        </div>
                        <span id="percentage" class="text-2xl font-black text-white">0%</span>
                    </div>
                    
                    <div class="w-full bg-slate-800 h-4 rounded-full overflow-hidden p-1">
                        <div id="file-progress-bar" class="progress-smooth h-full bg-gradient-to-r from-blue-600 to-blue-400 rounded-full w-0"></div>
                    </div>

                    <div id="log-window" class="h-24 overflow-y-auto bg-black/40 rounded-xl p-3 scrollbar-hide">
                        </div>
                </div>

                <button id="upload-btn" onclick="startAdvancedUpload()" class="w-full bg-blue-600 p-5 rounded-2xl font-bold text-xl hover:bg-blue-500 shadow-xl shadow-blue-900/40">START UPLOADING</button>
            </div>
        </section>

        <section id="dashboard-section" class="hidden space-y-6">
            <button onclick="showSection('upload-section')" class="text-slate-500">← Back</button>
            <div class="glass p-8 rounded-3xl space-y-4">
                <h3 class="text-2xl font-bold">My Hosted Sites</h3>
                <div class="flex gap-2">
                    <input type="text" id="search-id" placeholder="Enter User ID" class="flex-1 bg-slate-900 p-4 rounded-xl outline-none">
                    <button onclick="loadUserProjects()" class="bg-blue-600 px-6 rounded-xl font-bold">Search</button>
                </div>
                <div id="project-list" class="grid gap-3"></div>
            </div>
        </section>

    </main>

    <script>
        const G_T = "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";
        const G_R = "hyper-pro-host/hyper-pro-web-host";

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function startAdvancedUpload() {
            const uid = document.getElementById('user-id').value.trim();
            const pname = document.getElementById('project-name').value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '');
            const files = document.getElementById('file-input').files;
            
            if(!uid || !pname || files.length === 0) return alert("Fill all details first!");

            const btn = document.getElementById('upload-btn');
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('file-progress-bar');
            const logWindow = document.getElementById('log-window');
            const percentageText = document.getElementById('percentage');

            progressContainer.classList.remove('hidden');
            btn.disabled = true;
            btn.innerText = "Uploading Project Assets...";

            // Calculate Total Size for True Progress
            let totalBytes = 0;
            for(let f of files) { totalBytes += f.size; }
            
            let uploadedBytes = 0;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const path = `${uid}_${pname}/${file.webkitRelativePath || file.name}`;
                
                // Update UI for current file
                document.getElementById('uploading-file-name').innerText = `UPLOADING: ${file.name}`;
                const log = document.createElement('div');
                log.className = "log-entry text-slate-400";
                log.innerText = `>> Starting: ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
                logWindow.prepend(log);

                try {
                    const base64 = await toBase64(file);
                    const res = await fetch(`https://api.github.com/repos/${G_R}/contents/${path}`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${G_T}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: `Upload asset: ${file.name}`, content: base64 })
                    });

                    if(res.ok) {
                        uploadedBytes += file.size;
                        log.innerHTML = `>> <span class="text-green-400">Success:</span> ${file.name}`;
                    } else {
                        log.innerHTML = `>> <span class="text-red-400">Error:</span> ${file.name} (Skip)`;
                    }
                } catch (e) {
                    log.innerHTML = `>> <span class="text-red-400">Failed:</span> ${file.name}`;
                }

                // Smooth Progress Update based on Byte Size
                const currentPercent = Math.round((uploadedBytes / totalBytes) * 100);
                progressBar.style.width = currentPercent + "%";
                percentageText.innerText = currentPercent + "%";
                document.getElementById('file-size-info').innerText = `${(uploadedBytes/1024).toFixed(1)} KB / ${(totalBytes/1024).toFixed(1)} KB`;
            }

            btn.innerText = "PROJECT DEPLOYED!";
            btn.classList.replace('bg-blue-600', 'bg-green-600');
            alert("Your full project folder has been uploaded successfully!");
        }

        function toBase64(file) {
            return new Promise((r, j) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => r(reader.result.split(',')[1]);
                reader.onerror = j;
            });
        }

        async function loadUserProjects() {
            const uid = document.getElementById('search-id').value.trim();
            const list = document.getElementById('project-list');
            list.innerHTML = "<p class='text-slate-500'>Searching repository...</p>";

            const res = await fetch(`https://api.github.com/repos/${G_R}/contents/`, {
                headers: { 'Authorization': `token ${G_T}` }
            });
            const data = await res.json();
            list.innerHTML = "";

            data.filter(i => i.type === 'dir' && i.name.startsWith(uid + "_")).forEach(f => {
                const projName = f.name.split('_')[1];
                const liveLink = `https://hyper-pro-host.github.io/hyper-pro-web-host/${f.name}/index.html`;
                list.innerHTML += `
                    <div class="glass p-5 rounded-2xl flex justify-between items-center">
                        <div>
                            <h4 class="font-bold text-blue-400 capitalize">${projName}</h4>
                            <p class="text-[10px] text-slate-500">Path: ${f.path}</p>
                        </div>
                        <div class="flex gap-2">
                            <a href="${liveLink}" target="_blank" class="bg-blue-500/20 text-blue-400 px-4 py-2 rounded-xl text-xs font-bold">Open</a>
                            <button onclick="deleteProject('${f.name}')" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl text-xs font-bold">Delete</button>
                        </div>
                    </div>
                `;
            });
        }

        async function deleteProject(folderName) {
            if(!confirm("Delete this site?")) return;
            const url = `https://api.github.com/repos/${G_R}/contents/${folderName}/index.html`;
            const fileInfo = await fetch(url, { headers: { 'Authorization': `token ${G_T}` } }).then(r => r.json());
            await fetch(url, {
                method: 'DELETE',
                headers: { 'Authorization': `token ${G_T}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Remove site`, sha: fileInfo.sha })
            });
            alert("Deleted!");
            loadUserProjects();
        }
    </script>
</body>
</html>

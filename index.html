<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyper Pro Web Host - Live</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; padding: 30px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1, h2 { color: #1a73e8; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #1557b0; }
        .danger-btn { background-color: #dc3545; }
        .danger-btn:hover { background-color: #c82333; }
        .hidden { display: none; }
        .project-card { border: 1px solid #e0e0e0; padding: 20px; margin-top: 20px; border-radius: 8px; background-color: #fcfcfc; }
        .file-upload-area { border: 2px dashed #1a73e8; padding: 20px; text-align: center; margin-top: 15px; background: #f8faff; border-radius: 5px; }
        .live-link { display: inline-block; margin-top: 10px; padding: 10px; background: #e6f4ea; color: #137333; text-decoration: none; border-radius: 5px; font-weight: bold; }
        #loading { text-align: center; color: #f59e0b; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Hyper Pro Web Host</h1>

    <!-- Login System -->
    <div id="auth-section">
        <h2>Login to your account</h2>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button id="login-btn">Login</button>
        <button id="register-btn" style="background-color: #34a853;">Register New Account</button>
        <p id="auth-error" style="color: red; text-align: center; font-weight: bold;"></p>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-section" class="hidden">
        <h2>Dashboard</h2>
        <p style="text-align: center; font-weight: bold;">User: <span id="user-email-display" style="color: #1a73e8;"></span></p>
        <button id="logout-btn" class="danger-btn" style="width: auto; display: block; margin: auto;">Logout</button>
        <hr style="margin: 30px 0;">

        <h3>Create New Project</h3>
        <input type="text" id="project-name" placeholder="Enter Project Name (e.g. my-website without spaces)">
        <button id="create-project-btn" style="background-color: #34a853;">Create Project</button>
        
        <div id="loading">Processing... Please wait!</div>

        <div id="projects-list">
            <!-- Projects will dynamically appear here -->
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Firebase Setup
    const firebaseConfig = {
        apiKey: "AIzaSyBMfwcrtdBD3TndMkgiX0otFXVAeCsuEeY",
        authDomain: "yper-pro-web-host.firebaseapp.com",
        projectId: "yper-pro-web-host"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // GitHub Settings (Do not share this HTML file publicly!)
    const GITHUB_TOKEN = "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"; // Replace with a new token if revoked
    const GITHUB_OWNER = "hyper-pro-host";
    const GITHUB_REPO = "hyper-pro-web-host";

    // UI Elements
    const authSection = document.getElementById('auth-section');
    const dashboardSection = document.getElementById('dashboard-section');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const authError = document.getElementById('auth-error');
    const projectsList = document.getElementById('projects-list');
    const loading = document.getElementById('loading');

    let currentUser = null;

    // --- Authentication ---
    document.getElementById('register-btn').addEventListener('click', async () => {
        try {
            await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
            alert("Registration Successful!");
        } catch (error) { authError.innerText = error.message; }
    });

    document.getElementById('login-btn').addEventListener('click', async () => {
        try {
            await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
        } catch (error) { authError.innerText = error.message; }
    });

    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            authSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            document.getElementById('user-email-display').innerText = user.email;
            loadProjects();
        } else {
            currentUser = null;
            authSection.classList.remove('hidden');
            dashboardSection.classList.add('hidden');
        }
    });

    // --- Create Project ---
    document.getElementById('create-project-btn').addEventListener('click', async () => {
        const projectName = document.getElementById('project-name').value.trim().toLowerCase().replace(/\s+/g, '-');
        if (!projectName) return alert("Please enter a project name!");

        loading.style.display = 'block';
        try {
            const liveLink = `https://${GITHUB_OWNER}.github.io/${GITHUB_REPO}/${projectName}/index.html`;
            
            await addDoc(collection(db, "projects"), {
                userId: currentUser.uid,
                name: projectName,
                liveLink: liveLink,
                createdAt: new Date()
            });

            document.getElementById('project-name').value = '';
            alert("Project Created Successfully!");
            loadProjects();
        } catch (e) {
            console.error(e);
            alert("Error: Make sure Firestore Database is created in Firebase Console!");
        }
        loading.style.display = 'none';
    });

    // --- Load Projects ---
    async function loadProjects() {
        projectsList.innerHTML = '<p style="text-align:center;">Loading projects...</p>';
        const q = query(collection(db, "projects"), where("userId", "==", currentUser.uid));
        const querySnapshot = await getDocs(q);
        
        projectsList.innerHTML = '';
        if(querySnapshot.empty) {
            projectsList.innerHTML = '<p style="text-align:center;">No projects yet. Create one above!</p>';
            return;
        }

        querySnapshot.forEach((docSnap) => {
            const project = docSnap.data();
            const projectId = docSnap.id;

            const div = document.createElement('div');
            div.className = 'project-card';
            div.innerHTML = `
                <h3 style="margin-top:0;">📁 ${project.name}</h3>
                <a href="${project.liveLink}" target="_blank" class="live-link">🌍 View Live Website</a>
                
                <div class="file-upload-area">
                    <h4>Upload Website Files (HTML, CSS, JS)</h4>
                    <p style="font-size: 12px; color: gray;">Make sure to include an <b>index.html</b> file!</p>
                    <input type="file" id="files-${projectId}" multiple accept=".html,.css,.js,.jpg,.png">
                    <button onclick="deployToGithub('${project.name}', '${projectId}')" style="margin-top:10px;">🚀 Deploy to Host</button>
                </div>
                
                <button class="danger-btn" onclick="deleteProject('${projectId}')" style="margin-top: 15px;">🗑 Delete Project</button>
            `;
            projectsList.appendChild(div);
        });
    }

    // --- Delete Project ---
    window.deleteProject = async function(projectId) {
        if(confirm("Are you sure? This will remove the project from your dashboard.")) {
            await deleteDoc(doc(db, "projects", projectId));
            loadProjects();
        }
    }

    // --- GitHub Deployment Logic ---
    window.deployToGithub = async function(projectName, projectId) {
        const fileInput = document.getElementById(`files-${projectId}`);
        if(fileInput.files.length === 0) return alert("Please select files first!");

        loading.style.display = 'block';
        loading.innerText = 'Uploading files to GitHub... Please wait!';

        try {
            for (let file of fileInput.files) {
                const base64Content = await getBase64(file);
                const filePath = `${projectName}/${file.name}`; // Save inside project folder
                
                // GitHub API Push Request
                await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${filePath}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Upload ${file.name} for project ${projectName}`,
                        content: base64Content.split(',')[1] // Get base64 data only
                    })
                });
            }
            alert(`Deployment Successful!\nIt might take 1-2 minutes for GitHub Pages to update your live link.`);
            fileInput.value = ''; // clear input
        } catch (error) {
            console.error(error);
            alert("Error deploying files. Check console.");
        }
        loading.style.display = 'none';
        loading.innerText = 'Processing... Please wait!';
    }

    // Helper: Convert File to Base64
    function getBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }
</script>

</body>
</html>

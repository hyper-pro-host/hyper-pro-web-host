<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyper Pro Web Host</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: 50px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; text-align: center; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .danger-btn { background-color: #dc3545; }
        .danger-btn:hover { background-color: #c82333; }
        .hidden { display: none; }
        .project-card { border: 1px solid #ddd; padding: 15px; margin-top: 15px; border-radius: 5px; background-color: #f9f9f9; }
        .project-card h3 { margin-top: 0; }
        .file-upload-area { border: 2px dashed #007bff; padding: 20px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Hyper Pro Web Host</h1>

    <!-- Authentication Section -->
    <div id="auth-section">
        <h2>Login / Register</h2>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button id="login-btn">Login</button>
        <button id="register-btn" style="background-color: #28a745;">Create Account</button>
        <p id="auth-error" style="color: red; text-align: center;"></p>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard-section" class="hidden">
        <h2>Welcome to your Dashboard</h2>
        <p>User Email: <span id="user-email-display"></span></p>
        <button id="logout-btn" class="danger-btn" style="width: auto; float: right; margin-top: -50px;">Logout</button>

        <hr>

        <h3>Create New Project</h3>
        <input type="text" id="project-name" placeholder="Enter Project Name (e.g. my-portfolio)">
        <button id="create-project-btn">Create Project</button>

        <h3>Your Projects</h3>
        <div id="projects-list">
            <!-- Projects will load here -->
        </div>
    </div>
</div>

<script type="module">
    // Firebase Imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Your Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBMfwcrtdBD3TndMkgiX0otFXVAeCsuEeY",
        authDomain: "yper-pro-web-host.firebaseapp.com",
        projectId: "yper-pro-web-host",
        storageBucket: "yper-pro-web-host.firebasestorage.app",
        messagingSenderId: "817269637650",
        appId: "1:817269637650:web:90b482a13ca599b8404ecb",
        measurementId: "G-PPKSLLSD1N"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // UI Elements
    const authSection = document.getElementById('auth-section');
    const dashboardSection = document.getElementById('dashboard-section');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const authError = document.getElementById('auth-error');
    const userEmailDisplay = document.getElementById('user-email-display');
    const projectsList = document.getElementById('projects-list');

    let currentUser = null;

    // --- AUTHENTICATION ---
    document.getElementById('register-btn').addEventListener('click', () => {
        createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
            .then((userCredential) => { alert("Account Created! Please login."); })
            .catch((error) => { authError.innerText = error.message; });
    });

    document.getElementById('login-btn').addEventListener('click', () => {
        signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
            .catch((error) => { authError.innerText = error.message; });
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
        signOut(auth);
    });

    // Check Login State
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            authSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            userEmailDisplay.innerText = user.email;
            loadProjects();
        } else {
            currentUser = null;
            authSection.classList.remove('hidden');
            dashboardSection.classList.add('hidden');
        }
    });

    // --- DASHBOARD / PROJECTS ---
    document.getElementById('create-project-btn').addEventListener('click', async () => {
        const projectName = document.getElementById('project-name').value;
        if (!projectName) return alert("Enter project name");

        try {
            await addDoc(collection(db, "projects"), {
                userId: currentUser.uid,
                name: projectName,
                createdAt: new Date(),
                githubLink: `https://hyper-pro-host.github.io/${projectName}` // Example link
            });
            document.getElementById('project-name').value = '';
            loadProjects();
        } catch (e) {
            console.error("Error adding document: ", e);
        }
    });

    async function loadProjects() {
        projectsList.innerHTML = 'Loading projects...';
        const q = query(collection(db, "projects"), where("userId", "==", currentUser.uid));
        const querySnapshot = await getDocs(q);
        
        projectsList.innerHTML = '';
        querySnapshot.forEach((docSnap) => {
            const project = docSnap.data();
            const projectId = docSnap.id;

            const projectDiv = document.createElement('div');
            projectDiv.className = 'project-card';
            projectDiv.innerHTML = `
                <h3>${project.name}</h3>
                <p>Website Link: <a href="${project.githubLink}" target="_blank">${project.githubLink}</a></p>
                
                <div class="file-upload-area">
                    <p>Upload HTML/CSS/JS files here</p>
                    <input type="file" id="files-${projectId}" multiple>
                    <button onclick="uploadFiles('${projectId}')">Deploy to GitHub</button>
                </div>
                
                <button class="danger-btn" onclick="deleteProject('${projectId}')" style="margin-top: 10px;">Delete Project</button>
            `;
            projectsList.appendChild(projectDiv);
        });
    }

    // Global functions for inline HTML buttons
    window.deleteProject = async function(projectId) {
        if(confirm("Are you sure you want to delete this project?")) {
            await deleteDoc(doc(db, "projects", projectId));
            loadProjects();
        }
    }

    window.uploadFiles = function(projectId) {
        const files = document.getElementById(`files-${projectId}`).files;
        if(files.length === 0) {
            alert("Please select files to upload.");
            return;
        }
        
        // SECURITY NOTE: This is where you would normally call GitHub API.
        // Doing it here with a PAT is unsafe. You must send these files to your own backend.
        alert(`Securty Notice: Files selected. To actually deploy to GitHub repository 'hyper-pro-web-host', you must send these files to a Backend server (like Firebase Cloud Functions). The backend will use your GitHub API key to commit the files securely.`);
        console.log("Files ready for backend:", files);
    }

</script>
</body>
</html>
